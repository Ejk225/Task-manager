version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: task_manager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: task_manager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"   # 5433 pour ne pas conflictet avec ton postgres local
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - task_network

  # Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task_manager_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: postgres        # nom du service docker
      DB_PORT: 5432
      DB_NAME: task_manager_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: ton_jwt_secret_super_long_ici
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - uploads_data:/app/uploads
    networks:
      - task_network

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task_manager_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - task_network

volumes:
  postgres_data:
  uploads_data:

networks:
  task_network:
    driver: bridge